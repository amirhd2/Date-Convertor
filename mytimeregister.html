<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاسبه ساعت خروج از اداره</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Lucide Icons -->
    <script type="module" src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        /* Define Inter font for better typography, although we are primarily using a clean system font, Tailwind recommends Inter */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1a1a2e; /* Dark professional background */
            padding: 20px;
        }

        /* Custom styles for the input box */
        #timeInInput,
        #durationHoursInput,
        #durationMinutesInput {
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums; /* Ensures numbers line up nicely */
            appearance: none; /* Remove default browser styling */
        }
        #timeInInput:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.5); /* Indigo focus ring */
            border-color: #6366f1;
        }

        /* Style for the large result text */
        .result-text {
            font-size: 3rem; /* Extra large text */
            line-height: 1;
            font-weight: 700;
            color: #f0f0f0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
            font-variant-numeric: tabular-nums;
        }

        /* Spinner style for loading state */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #a855f7; /* Purple accent */
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="w-full max-w-2xl bg-[#202040] p-6 sm:p-10 rounded-3xl shadow-2xl border border-[#303060]">
        
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl sm:text-4xl font-extrabold text-[#93c5fd] tracking-wide mb-2">
                <i data-lucide="clock" class="inline-block w-8 h-8 sm:w-10 sm:h-10 ml-2"></i>
                محاسبه‌گر ساعت کاری
            </h1>
            <p class="text-gray-400 text-sm sm:text-base">ساعت ورود و مدت زمان حضور را وارد کنید.</p>
        </header>

        <main class="space-y-6">
            
            <!-- 1. Input Section (ساعت ورود) -->
            <div class="bg-[#303060] p-6 rounded-2xl shadow-lg">
                <label for="timeInInput" class="flex items-center text-lg font-semibold text-indigo-300 mb-3">
                    <i data-lucide="log-in" class="w-6 h-6 ml-2"></i>
                    ساعت ورود (HHMM)
                </label>
                <input
                    type="number"
                    id="timeInInput"
                    placeholder="مثلاً 730"
                    min="0"
                    max="2359"
                    autofocus
                    class="w-full h-16 text-3xl text-white bg-[#404070] border-2 border-indigo-500 rounded-xl px-4 focus:outline-none placeholder:text-gray-500"
                    oninput="calculateTime()"
                    maxlength="4"
                >
                <p id="error-message" class="mt-2 text-sm text-red-400 hidden font-medium">
                    <i data-lucide="alert-triangle" class="inline-block w-4 h-4 ml-1"></i>
                    ورودی ساعت ورود نامعتبر است. (مثلاً ۷۳۰ یا ۱۰۴۵)
                </p>
            </div>

            <!-- 2. Adjustable Duration Section (مدت زمان حضور) -->
            <div class="bg-[#303060] p-6 rounded-2xl shadow-lg">
                <label class="flex items-center text-lg font-semibold text-purple-300 mb-3">
                    <i data-lucide="timer" class="w-6 h-6 ml-2"></i>
                    مدت زمان حضور در اداره (ساعت:دقیقه)
                </label>
                <div class="flex space-x-4 rtl:space-x-reverse">
                    
                    <!-- Minutes Input (جابه‌جا شده به ابتدای لیست برای نمایش در سمت راست) -->
                    <div class="flex-1">
                        <input
                            type="number"
                            id="durationMinutesInput"
                            value="15"
                            min="0"
                            max="59"
                            class="w-full h-12 text-2xl text-center text-white bg-[#404070] border-2 border-purple-500 rounded-xl px-2 focus:outline-none placeholder:text-gray-500"
                            oninput="calculateTime()"
                            maxlength="2"
                        >
                        <p class="text-xs text-center text-purple-400 mt-1">دقیقه</p>
                    </div>

                    <div class="flex items-center text-4xl text-purple-300 font-bold">:</div>
                    
                    <!-- Hours Input (جابه‌جا شده به انتهای لیست برای نمایش در سمت چپ) -->
                    <div class="flex-1">
                        <input
                            type="number"
                            id="durationHoursInput"
                            value="8"
                            min="0"
                            max="23"
                            class="w-full h-12 text-2xl text-center text-white bg-[#404070] border-2 border-purple-500 rounded-xl px-2 focus:outline-none placeholder:text-gray-500"
                            oninput="calculateTime()"
                            maxlength="2"
                        >
                        <p class="text-xs text-center text-purple-400 mt-1">ساعت</p>
                    </div>

                </div>
                <p id="duration-error-message" class="mt-2 text-sm text-red-400 hidden font-medium text-center">
                    <i data-lucide="alert-triangle" class="inline-block w-4 h-4 ml-1"></i>
                    دقیقه نامعتبر است (باید بین ۰ تا ۵۹ باشد).
                </p>
            </div>

            <!-- 3. Output Section (ساعت خروج نهایی) -->
            <div class="bg-indigo-600 p-8 rounded-3xl shadow-xl border-4 border-indigo-400 text-center">
                <div class="flex justify-center items-center text-xl sm:text-2xl font-semibold text-white mb-4">
                    <i data-lucide="log-out" class="w-7 h-7 sm:w-8 sm:h-8 ml-2"></i>
                    ساعت خروج نهایی
                </div>
                <div id="loading-indicator" class="hidden flex justify-center items-center h-full">
                    <div class="spinner"></div>
                </div>
                <div id="timeOutDisplay" class="result-text text-white">
                    --:--
                </div>
            </div>

        </main>

        <footer class="mt-8 text-center text-gray-500 text-sm">
            <p>ساعت خروج بر اساس ساعت ورود و مدت زمان حضور قابل تنظیم شما محاسبه می‌شود.</p>
        </footer>
    </div>

    <script>
        // Initialize Lucide Icons
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
        
        // Get DOM elements
        const inputField = document.getElementById('timeInInput');
        const durationHoursInput = document.getElementById('durationHoursInput');
        const durationMinutesInput = document.getElementById('durationMinutesInput');
        const durationErrorMessage = document.getElementById('duration-error-message');
        const outputDisplay = document.getElementById('timeOutDisplay');
        const errorMessage = document.getElementById('error-message');
        const loadingIndicator = document.getElementById('loading-indicator');
        
        /**
         * Converts total minutes (since midnight) into HH:MM string format (24-hour).
         * @param {number} totalMinutes - Total minutes (e.g., 945)
         * @returns {string} - Formatted time string (e.g., "15:45")
         */
        function formatTime(totalMinutes) {
            // Handle wrap-around (e.g., 25:00 should be 01:00 the next day)
            const minutesInDay = 24 * 60;
            const minutesOfDay = totalMinutes % minutesInDay;
            
            const hours = Math.floor(minutesOfDay / 60);
            const minutes = minutesOfDay % 60;
            
            // Pad with leading zeros
            const hourStr = String(hours).padStart(2, '0');
            const minuteStr = String(minutes).padStart(2, '0');
            
            return `${hourStr}:${minuteStr}`;
        }

        /**
         * Calculates the clock-out time based on user input.
         */
        function calculateTime() {
            // Display loading indicator briefly
            outputDisplay.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');

            // Debounce or small timeout for visual effect
            setTimeout(() => {
                loadingIndicator.classList.add('hidden');
                outputDisplay.classList.remove('hidden');

                const rawInput = inputField.value.trim();
                
                // 1. Basic Validation for Time In (HHMM)
                if (rawInput === "") {
                    outputDisplay.textContent = "--:--";
                    errorMessage.classList.add('hidden');
                    durationErrorMessage.classList.add('hidden');
                    return;
                }

                // Ensure it's a number and has 3 or 4 digits
                if (!/^\d{3,4}$/.test(rawInput)) {
                    outputDisplay.textContent = "خطا";
                    errorMessage.textContent = "ورودی ساعت ورود نامعتبر است. (مثلاً ۷۳۰ یا ۱۰۴۵)";
                    errorMessage.classList.remove('hidden');
                    return;
                }
                
                errorMessage.classList.add('hidden');
                
                let inputHours;
                let inputMinutes;
                
                // Handle HHMM split (e.g., 730 -> 7:30, 1045 -> 10:45)
                if (rawInput.length === 3) {
                    inputHours = parseInt(rawInput.substring(0, 1), 10);
                    inputMinutes = parseInt(rawInput.substring(1, 3), 10);
                } 
                else if (rawInput.length === 4) {
                    inputHours = parseInt(rawInput.substring(0, 2), 10);
                    inputMinutes = parseInt(rawInput.substring(2, 4), 10);
                } else {
                    outputDisplay.textContent = "خطا";
                    errorMessage.textContent = "ورودی ساعت ورود نامعتبر است. (مثلاً ۷۳۰ یا ۱۰۴۵)";
                    errorMessage.classList.remove('hidden');
                    return;
                }
                
                // 2. Time In Logic Validation
                if (inputHours > 23 || inputMinutes > 59) {
                    outputDisplay.textContent = "خطا";
                    errorMessage.textContent = "ساعت یا دقیقه ورودی نامعتبر است. (ساعت تا ۲۳ و دقیقه تا ۵۹)";
                    errorMessage.classList.remove('hidden');
                    return;
                }
                
                // --- Duration Input Handling and Validation ---
                const durationHours = parseInt(durationHoursInput.value || '0', 10);
                const durationMinutes = parseInt(durationMinutesInput.value || '0', 10);

                if (durationMinutes < 0 || durationMinutes > 59) {
                    outputDisplay.textContent = "خطا";
                    durationErrorMessage.classList.remove('hidden');
                    return;
                }
                
                durationErrorMessage.classList.add('hidden');

                const FIXED_DURATION_TOTAL_MINUTES = (durationHours * 60) + durationMinutes;
                
                // 3. Calculation
                const timeInTotalMinutes = (inputHours * 60) + inputMinutes;
                const timeOutTotalMinutes = timeInTotalMinutes + FIXED_DURATION_TOTAL_MINUTES;
                
                // 4. Display Result
                outputDisplay.textContent = formatTime(timeOutTotalMinutes);
                
            }, 150); // Small delay for visual feedback
        }

        window.onload = function() {
            // Add event listener to recalculate on key up or change for the entry time
            inputField.addEventListener('keyup', calculateTime);
            inputField.addEventListener('change', calculateTime);
            
            // Initial run
            calculateTime();
        };

    </script>

</body>
</html>
