<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LMO Launcher v2</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;

font-family:'Vazirmatn',sans-serif;

overflow:hidden;

background:
radial-gradient(circle at top right,#5145CD 0%,transparent 30%),
radial-gradient(circle at bottom left,#06B6D4 0%,transparent 28%),
linear-gradient(135deg,#0f172a,#1e293b,#111827);

color:white;

}

body{

display:flex;
justify-content:center;
align-items:center;

}

#launcher-view{

width:100%;
height:100vh;

padding:30px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

}

.title{

font-size:44px;

font-weight:800;

background:linear-gradient(90deg,#ffffff,#7dd3fc);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

margin-bottom:8px;

}

.subtitle{

color:#cbd5e1;

font-size:18px;

margin-bottom:30px;

}

.cards{

width:100%;

max-width:1350px;

display:grid;

grid-template-columns:repeat(2,1fr);

gap:22px;

}

.app-button{

position:relative;

overflow:hidden;

height:220px;

border-radius:28px;

background:rgba(255,255,255,.07);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(18px);

cursor:pointer;

transition:.35s;

box-shadow:
0 15px 40px rgba(0,0,0,.35);

}

.app-button:hover{

transform:translateY(-8px);

box-shadow:
0 25px 55px rgba(0,0,0,.45);

}

.app-button::before{

content:"";

position:absolute;

width:260px;

height:260px;

border-radius:50%;

right:-90px;

top:-90px;

opacity:.12;

}

.date::before{

background:#3B82F6;

}

.phone::before{

background:#22C55E;

}

.time::before{

background:#F59E0B;

}

.number::before{

background:#A855F7;

}

.card-content{

position:relative;

z-index:2;

height:100%;

display:flex;

align-items:center;

justify-content:space-between;

padding:30px;

}

.info h2{

font-size:30px;

font-weight:800;

margin-bottom:10px;

}

.info p{

line-height:2;

font-size:15px;

color:#dbe4ee;

max-width:290px;

}

.icon{

width:120px;

height:120px;

transition:.35s;

}

.app-button:hover .icon{

transform:scale(1.08) rotate(6deg);

}

#iframe-view{

display:none;

width:100%;

height:100vh;

flex-direction:column;

background:#0f172a;

}

header{

height:72px;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 24px;

background:rgba(15,23,42,.9);

backdrop-filter:blur(18px);

border-bottom:1px solid rgba(255,255,255,.08);

}

#back-button{

padding:10px 18px;

border:none;

border-radius:14px;

cursor:pointer;

background:#2563eb;

color:white;

font-size:15px;

transition:.3s;

}

#back-button:hover{

background:#1d4ed8;

}

#iframe-title{

font-size:22px;

font-weight:700;

}

#content-iframe{

width:100%;

height:calc(100vh - 72px);

border:none;

background:white;

}

@media(max-width:900px){

html,body{

overflow:auto;

}

#launcher-view{

height:auto;

}

.cards{

grid-template-columns:1fr;

}

.app-button{

height:180px;

}

.title{

font-size:34px;

}

.icon{

width:90px;

height:90px;

}

}

</style>
</head>

<body>

<div id="launcher-view">

    <h1 class="title">LMO Launcher</h1>

    <div class="subtitle">

        انتخاب ابزار مورد نیاز

    </div>

    <div class="cards">

        <!-- ===================== -->

        <!-- تبدیل تاریخ -->

        <!-- ===================== -->

        <button
            class="app-button date"
            data-url="./mydateconvertor.html"
            data-title="تبدیل‌گر تاریخ">

            <div class="card-content">

                <div class="info">

                    <h2>تبدیل تاریخ</h2>

                    <p>

                        تبدیل تاریخ شمسی،
                        میلادی و قمری

                    </p>

                </div>

                <svg
                    class="icon"
                    viewBox="0 0 128 128">

                    <rect
                        x="18"
                        y="24"
                        width="92"
                        height="84"
                        rx="18"
                        fill="#3B82F6"/>

                    <rect
                        x="18"
                        y="24"
                        width="92"
                        height="22"
                        fill="#1D4ED8"/>

                    <circle cx="38" cy="18" r="6" fill="white"/>

                    <circle cx="90" cy="18" r="6" fill="white"/>

                    <rect x="34" y="58" width="16" height="16" fill="white"/>

                    <rect x="58" y="58" width="16" height="16" fill="white"/>

                    <rect x="82" y="58" width="16" height="16" fill="white"/>

                    <rect x="34" y="80" width="16" height="16" fill="white"/>

                    <rect x="58" y="80" width="16" height="16" fill="white"/>

                </svg>

            </div>

        </button>

        <!-- ===================== -->

        <!-- دفترچه تلفن -->

        <!-- ===================== -->

        <button
            class="app-button phone"
            data-url="https://lmo.ir/s/mfaNnd"
            data-title="دفترچه تلفن">

            <div class="card-content">

                <div class="info">

                    <h2>دفترچه تلفن</h2>

                    <p>

                        دسترسی سریع
                        به شماره‌های سازمان

                    </p>

                </div>

                <svg
                    class="icon"
                    viewBox="0 0 128 128">

                    <rect
                        x="32"
                        y="18"
                        width="64"
                        height="92"
                        rx="14"
                        fill="#22C55E"/>

                    <circle
                        cx="64"
                        cy="38"
                        r="8"
                        fill="white"/>

                    <rect
                        x="46"
                        y="56"
                        width="36"
                        height="8"
                        rx="4"
                        fill="white"/>

                    <rect
                        x="46"
                        y="74"
                        width="36"
                        height="8"
                        rx="4"
                        fill="white"/>

                    <rect
                        x="46"
                        y="92"
                        width="26"
                        height="8"
                        rx="4"
                        fill="white"/>

                </svg>

            </div>

        </button>

        <!-- ===================== -->

        <!-- ثبت زمان -->

        <!-- ===================== -->

        <button
            class="app-button time"
            data-url="./mytimeregister.html"
            data-title="ثبت زمان">

            <div class="card-content">

                <div class="info">

                    <h2>ثبت زمان</h2>

                    <p>

                        مدیریت ساعت کاری
                        و پروژه‌ها

                    </p>

                </div>

                <svg
                    class="icon"
                    viewBox="0 0 128 128">

                    <circle
                        cx="64"
                        cy="64"
                        r="42"
                        fill="#F59E0B"/>

                    <circle
                        cx="64"
                        cy="64"
                        r="30"
                        fill="white"/>

                    <rect
                        x="62"
                        y="42"
                        width="4"
                        height="24"
                        fill="#F59E0B"/>

                    <rect
                        x="64"
                        y="62"
                        width="18"
                        height="4"
                        fill="#F59E0B"/>

                </svg>

            </div>

        </button>

        <!-- ===================== -->

        <!-- تبدیل اعداد -->

        <!-- ===================== -->

        <button
            class="app-button number"
            data-url="./mynumberconvertor.html"
            data-title="تبدیل اعداد">

            <div class="card-content">

                <div class="info">

                    <h2>تبدیل اعداد</h2>

                    <p>

                        تبدیل انواع اعداد
                        و واحدها

                    </p>

                </div>

                <svg
                    class="icon"
                    viewBox="0 0 128 128">

                    <rect
                        x="34"
                        y="18"
                        width="60"
                        height="92"
                        rx="12"
                        fill="#A855F7"/>

                    <rect
                        x="44"
                        y="30"
                        width="40"
                        height="14"
                        fill="white"/>

                    <circle cx="50" cy="62" r="5" fill="white"/>
                    <circle cx="64" cy="62" r="5" fill="white"/>
                    <circle cx="78" cy="62" r="5" fill="white"/>

                    <circle cx="50" cy="80" r="5" fill="white"/>
                    <circle cx="64" cy="80" r="5" fill="white"/>
                    <circle cx="78" cy="80" r="5" fill="white"/>

                </svg>

            </div>

        </button>

    </div>

</div>
<div id="iframe-view">

    <header>

        <button id="back-button">

            ← بازگشت

        </button>

        <div id="iframe-title">

        </div>

    </header>

    <iframe
        id="content-iframe"
        title="LMO"></iframe>

</div>

<script>

const launcherButtons=document.querySelectorAll(".app-button");

const launcherView=document.getElementById("launcher-view");

const iframeView=document.getElementById("iframe-view");

const iframe=document.getElementById("content-iframe");

const iframeTitle=document.getElementById("iframe-title");

const backButton=document.getElementById("back-button");

launcherButtons.forEach(button=>{

button.addEventListener("click",()=>{

const url=button.dataset.url;

const title=button.dataset.title;

/* لینک اینترنتی */

if(url.startsWith("http")){

window.location.href=url;

return;

}

/* فایل محلی */

iframe.src=url;

iframeTitle.textContent=title;

launcherView.style.display="none";

iframeView.style.display="flex";

});

});

backButton.addEventListener("click",()=>{

iframe.src="about:blank";

iframeTitle.textContent="";

iframeView.style.display="none";

launcherView.style.display="flex";

});

window.addEventListener("resize",()=>{

iframe.style.height="calc(100vh - 72px)";

});

window.dispatchEvent(new Event("resize"));

</script>
